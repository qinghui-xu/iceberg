name: "Criteo 1.10.x Release"

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  release-artifacts:
    if: github.event.release.target_commitish == 'criteo-1.10.x'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 11

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Set release version
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="${tag#apache-iceberg-}"
          echo "${version}" > version.txt
          echo "RELEASE_VERSION=${version}" >> "${GITHUB_ENV}"
          echo "MAVEN_REPOSITORY=${RUNNER_TEMP}/maven-repository" >> "${GITHUB_ENV}"

      - name: Build release artifacts
        run: |
          repository_url="file://${MAVEN_REPOSITORY}"

          ./gradlew \
            -DscalaVersion=2.12 \
            -DflinkVersions=1.20 \
            -DsparkVersions=3.5 \
            -DkafkaVersions=3 \
            publishApachePublicationToMavenRepository \
            -PmavenSnapshotsRepo="${repository_url}" \
            --no-parallel \
            --no-configuration-cache

      - name: Package release assets
        run: |
          mkdir -p "${RUNNER_TEMP}/release-assets"
          asset_name="apache-iceberg-${RELEASE_VERSION}.tar.gz"
          asset="${RUNNER_TEMP}/release-assets/${asset_name}"

          tar -czf "${asset}" -C "${MAVEN_REPOSITORY}" .
          cd "${RUNNER_TEMP}/release-assets"
          sha512sum "${asset_name}" > "${asset_name}.sha512"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload \
            "${{ github.event.release.tag_name }}" \
            "${RUNNER_TEMP}/release-assets/apache-iceberg-${RELEASE_VERSION}.tar.gz" \
            "${RUNNER_TEMP}/release-assets/apache-iceberg-${RELEASE_VERSION}.tar.gz.sha512" \
            --clobber
